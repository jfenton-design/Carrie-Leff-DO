<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Carrie Leff — Order Builder</title>
<style>
:root {
  --rose: #FF467D;
  --burgundy: #5B0048;
  --rose-light: #fff0f4;
  --burgundy-light: #f9f0f7;
  --border: #e8d5e4;
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --bg: #fafafa;
  --white: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

.site-header { background: var(--white); border-bottom: 2px solid var(--rose); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(91,0,72,0.08); }
.site-header svg { height: 36px; width: auto; }
.tool-label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

.app { display: grid; grid-template-columns: 1fr 320px; gap: 0; min-height: calc(100vh - 64px); }

.left-panel { padding: 24px; overflow-y: auto; max-height: calc(100vh - 64px); }

.patient-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
.field-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.field-group label { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--burgundy); }
.field-group input { border: 1.5px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 14px; color: var(--text); background: var(--white); outline: none; transition: border-color 0.15s; }
.field-group input:focus { border-color: var(--rose); }

.tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 16px; }
.tab { padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab.active { color: var(--burgundy); border-bottom-color: var(--rose); }
.tab:hover:not(.active) { color: var(--burgundy); }

.search-bar { position: relative; margin-bottom: 12px; }
.search-bar input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px 9px 36px; font-size: 14px; outline: none; background: var(--white); transition: border-color 0.15s; }
.search-bar input:focus { border-color: var(--rose); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

.category-filters { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.cat-btn { padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--white); color: var(--muted); transition: all 0.15s; white-space: nowrap; }
.cat-btn.active { background: var(--burgundy); border-color: var(--burgundy); color: #fff; }
.cat-btn:hover:not(.active) { border-color: var(--burgundy); color: var(--burgundy); }

.category-heading { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--rose); padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; margin-top: 8px; }
.item-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; cursor: pointer; transition: background 0.1s; border: 1.5px solid transparent; }
.item-row:hover { background: var(--rose-light); }
.item-row.checked { background: var(--rose-light); border-color: var(--rose); }
.item-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--rose); cursor: pointer; flex-shrink: 0; }
.item-name { flex: 1; font-size: 13px; line-height: 1.3; }
.item-code { font-size: 11px; color: var(--muted); margin-top: 1px; }
.item-price { font-size: 13px; font-weight: 600; color: var(--burgundy); flex-shrink: 0; min-width: 56px; text-align: right; }
.no-results { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; }

.right-panel { background: var(--white); border-left: 2px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 64px; height: calc(100vh - 64px); }
.summary-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
.summary-title { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--burgundy); margin-bottom: 2px; }
.summary-count { font-size: 12px; color: var(--muted); }
.summary-items { flex: 1; overflow-y: auto; padding: 8px 18px; }
.summary-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px; }
.summary-item:last-child { border-bottom: none; }
.summary-item-name { font-size: 12px; color: var(--text); flex: 1; line-height: 1.3; }
.summary-item-source { font-size: 10px; color: var(--muted); }
.summary-item-price { font-size: 12px; font-weight: 600; color: var(--burgundy); flex-shrink: 0; }
.summary-item-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 0 2px; line-height: 1; flex-shrink: 0; }
.summary-item-remove:hover { color: var(--rose); }
.empty-state { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 12px; line-height: 1.6; }
.summary-footer { border-top: 2px solid var(--border); padding: 14px 18px; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.total-label { font-size: 13px; font-weight: 700; color: var(--burgundy); }
.total-amount { font-size: 20px; font-weight: 700; color: var(--burgundy); }
.action-btns { display: flex; flex-direction: column; gap: 8px; }
.btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: var(--rose); color: #fff; }
.btn-primary:hover { background: #e03068; }
.btn-secondary { background: var(--white); color: var(--burgundy); border: 1.5px solid var(--burgundy); }
.btn-secondary:hover { background: var(--burgundy-light); }

/* ── MOBILE FAB & OVERLAY ─────────────────────────────────────────────────── */
.mobile-fab {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 16px;
  background: var(--rose);
  color: #fff;
  border: none;
  border-radius: 28px;
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,70,125,0.45);
  z-index: 200;
  align-items: center;
  gap: 8px;
  transition: transform 0.15s;
}
.mobile-fab:active { transform: scale(0.97); }
.fab-badge {
  background: #fff;
  color: var(--rose);
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
  display: inline-block;
}
.mobile-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 150;
  -webkit-tap-highlight-color: transparent;
}
.mobile-overlay.active { display: block; }
.drawer-handle {
  display: none;
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 8px;
  flex-shrink: 0;
}
.summary-close-btn {
  display: none;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--muted);
  padding: 0 2px;
  line-height: 1;
  flex-shrink: 0;
}
.summary-close-btn:hover { color: var(--rose); }

/* ── RESPONSIVE ───────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .app { display: block; }

  .left-panel {
    max-height: none;
    overflow-y: visible;
    padding: 16px;
    padding-bottom: 90px;
  }

  .site-header { padding: 10px 16px; }
  .site-header svg { height: 28px; }
  .tool-label { font-size: 11px; }

  .patient-row { flex-direction: column; gap: 10px; }

  .tabs { overflow-x: auto; }
  .tab { white-space: nowrap; padding: 10px 16px; }

  .category-filters {
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .category-filters::-webkit-scrollbar { display: none; }
  .cat-btn { flex-shrink: 0; }

  /* Summary becomes a slide-up drawer */
  .right-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 82vh;
    border-left: none;
    border-top: 2px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    z-index: 160;
    box-shadow: 0 -8px 32px rgba(91,0,72,0.14);
  }
  .right-panel.open { transform: translateY(0); }

  .summary-header {
    border-radius: 16px 16px 0 0;
    flex-direction: column;
    padding: 10px 18px 12px;
  }
  .summary-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  .drawer-handle { display: block; }
  .summary-close-btn { display: block; }
  .mobile-fab { display: flex; }

  .item-row { padding: 8px; }
  .item-name { font-size: 13px; }
}

@media (max-width: 420px) {
  .left-panel { padding: 12px; padding-bottom: 90px; }
  .tab { font-size: 12px; padding: 10px 12px; }
  .total-amount { font-size: 18px; }
}
</style>

const RMI_CATS = Object.keys(RMI);

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeTab = 'labcorp';
let activeCat = 'all';
let selected = {};

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('visitDate').value = new Date().toISOString().split('T')[0];
  buildCatButtons();
  renderList();
});

function buildCatButtons() {
  const cats = activeTab === 'labcorp' ? LC_CATS : RMI_CATS;
  const el = document.getElementById('catFilters');
  el.innerHTML = `<button class="cat-btn active" onclick="setCat('all',this)">All</button>` +
    cats.map(c => `<button class="cat-btn" onclick="setCat('${c.replace(/'/g,"\\'")}',this)">${c}</button>`).join('');
}

function switchTab(tab) {
  activeTab = tab;
  activeCat = 'all';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&tab==='labcorp')||(i===1&&tab==='rmi')));
  buildCatButtons();
  renderList();
}

function setCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const panel = document.getElementById('itemsPanel');
  let html = '';

  if (activeTab === 'labcorp') {
    let items = LABCORP.filter(r => {
      const matchCat = activeCat === 'all' || r[3] === activeCat;
      const matchQ = !q || r[1].toLowerCase().includes(q) || r[0].toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    if (!items.length) { panel.innerHTML = '<div class="no-results">No tests match your search.</div>'; return; }

    if (activeCat === 'all' && !q) {
      // group by category
      const groups = {};
      items.forEach(r => { (groups[r[3]] = groups[r[3]]||[]).push(r); });
      LC_CATS.forEach(cat => {
        if (!groups[cat]) return;
        html += `<div class="category-heading">${cat}</div>`;
        groups[cat].forEach(r => html += itemRow('lc_'+r[0], r[1], r[2], 'Labcorp — '+r[3], r[0]));
      });
    } else {
      items.forEach(r => html += itemRow('lc_'+r[0], r[1], r[2], 'Labcorp — '+r[3], r[0]));
    }
  } else {
    const cats = activeCat === 'all' ? RMI_CATS : [activeCat];
    let any = false;
    cats.forEach(cat => {
      let items = RMI[cat].filter(r => !q || r[1].toLowerCase().includes(q) || r[0].toLowerCase().includes(q));
      if (!items.length) return;
      any = true;
      html += `<div class="category-heading">${cat}</div>`;
      items.forEach(r => html += itemRow('rmi_'+cat+'_'+r[0], r[1], r[2], 'RMI — '+cat, r[0]));
    });
    if (!any) html = '<div class="no-results">No items match your search.</div>';
  }
  panel.innerHTML = html;
}

function itemRow(key, name, price, source, code) {
  const chk = selected[key] ? 'checked' : '';
  const cls = selected[key] ? 'item-row checked' : 'item-row';
  const ks = key.replace(/'/g,"\\'");
  const ns = name.replace(/'/g,"\\'");
  const ss = source.replace(/'/g,"\\'");
  const cs = code.replace(/'/g,"\\'");
  return `<div class="${cls}" onclick="toggle('${ks}','${ns}',${price},'${ss}','${cs}')">
    <input type="checkbox" ${chk} onclick="event.stopPropagation();toggle('${ks}','${ns}',${price},'${ss}','${cs}')">
    <div class="item-name">${name}<div class="item-code">${code}</div></div>
    <div class="item-price">${fmt(price)}</div>
  </div>`;
}

function fmt(n) { return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── SELECTION ─────────────────────────────────────────────────────────────────
function toggle(key, name, price, source, code) {
  if (selected[key]) delete selected[key];
  else selected[key] = {name, price, source, code};
  renderList();
  renderSummary();
}

function removeItem(key) { delete selected[key]; renderList(); renderSummary(); }
function clearAll() { selected = {}; renderList(); renderSummary(); }

// ── MOBILE DRAWER ─────────────────────────────────────────────────────────────
function openSummary() {
  document.getElementById('rightPanel').classList.add('open');
  document.getElementById('mobileOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeSummary() {
  document.getElementById('rightPanel').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function renderSummary() {
  const keys = Object.keys(selected);
  const total = keys.reduce((s,k) => s+selected[k].price, 0);
  document.getElementById('summaryCount').textContent = keys.length ? `${keys.length} item${keys.length>1?'s':''} selected` : 'No items selected';
  document.getElementById('totalAmount').textContent = fmt(total);
  // Update FAB badge
  const fab = document.getElementById('mobileFab');
  const badge = document.getElementById('fabBadge');
  badge.textContent = keys.length;
  fab.style.opacity = keys.length ? '1' : '0.75';
  const box = document.getElementById('summaryItems');
  if (!keys.length) { box.innerHTML = '<div class="empty-state">Check items on the left to build your recommendation list.</div>'; return; }
  box.innerHTML = keys.map(k => {
    const it = selected[k];
    const ks = k.replace(/'/g,"\\'");
    return `<div class="summary-item">
      <div><div class="summary-item-name">${it.name}</div><div class="summary-item-source">${it.source}</div></div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="summary-item-price">${fmt(it.price)}</span>
        <button class="summary-item-remove" onclick="removeItem('${ks}')" title="Remove">×</button>
      </div>
    </div>`;
  }).join('');
}
